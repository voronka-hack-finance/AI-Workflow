name: ai-workflow-prod

x-env-files: &env-files
  env_file:
    - path: .env.production
      required: true

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 20s

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ai-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      <<: *healthcheck-defaults

  llm-intent-parser-service:
    <<: *env-files
    image: ${REGISTRY}/${IMAGE_OWNER}/llm-intent-parser-service:${IMAGE_TAG}
    container_name: llm-intent-parser-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8011:8011"
    environment:
      INTENT_PARSER_LLM_PROVIDER: ${INTENT_PARSER_LLM_PROVIDER}
      INTENT_PARSER_LLM_MODEL: ${INTENT_PARSER_LLM_MODEL}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY}
      INTENT_PARSER_LLM_TIMEOUT_SECONDS: ${INTENT_PARSER_LLM_TIMEOUT_SECONDS}
      INTENT_PARSER_FEW_SHOT_LIMIT: ${INTENT_PARSER_FEW_SHOT_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8011/health'')"',
        ]
      <<: *healthcheck-defaults

  ai-context-builder-service:
    <<: *env-files
    image: ${REGISTRY}/${IMAGE_OWNER}/ai-context-builder-service:${IMAGE_TAG}
    container_name: ai-context-builder-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8012:8012"
    environment:
      CONTEXT_BUILDER_DATA_PROVIDER: rabbitmq

      # На всякий случай оставляем оба варианта.
      # Если код читает BACKEND_RABBITMQ_URL — будет работать.
      # Если код читает RABBITMQ_URL, как в dev compose, тоже будет работать.
      BACKEND_RABBITMQ_URL: ${BACKEND_RABBITMQ_URL}
      RABBITMQ_URL: ${BACKEND_RABBITMQ_URL}

      RABBITMQ_BACKEND_DATA_REQUEST_QUEUE: ${RABBITMQ_BACKEND_DATA_REQUEST_QUEUE}
      RABBITMQ_BACKEND_DATA_RESPONSE_QUEUE: ${RABBITMQ_BACKEND_DATA_RESPONSE_QUEUE}
      CONTEXT_BUILDER_BACKEND_DATA_TIMEOUT_SECONDS: ${CONTEXT_BUILDER_BACKEND_DATA_TIMEOUT_SECONDS}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8012/health'')"',
        ]
      <<: *healthcheck-defaults

  analytics-service:
    <<: *env-files
    image: ${REGISTRY}/${IMAGE_OWNER}/analytics-service:${IMAGE_TAG}
    container_name: analytics-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8013:8013"
    environment:
      ANALYTICS_RULES_VERSION: ${ANALYTICS_RULES_VERSION}
      ANALYTICS_DEFAULT_CURRENCY: ${ANALYTICS_DEFAULT_CURRENCY}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8013/health'')"',
        ]
      <<: *healthcheck-defaults

  llm-response-agent-service:
    <<: *env-files
    image: ${REGISTRY}/${IMAGE_OWNER}/llm-response-agent-service:${IMAGE_TAG}
    container_name: llm-response-agent-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8014:8014"
    environment:
      RESPONSE_AGENT_LLM_PROVIDER: ${RESPONSE_AGENT_LLM_PROVIDER}
      RESPONSE_AGENT_LLM_MODEL: ${RESPONSE_AGENT_LLM_MODEL}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY}
      RESPONSE_AGENT_LLM_TIMEOUT_SECONDS: ${RESPONSE_AGENT_LLM_TIMEOUT_SECONDS}
      RESPONSE_AGENT_MAX_OUTPUT_TOKENS: ${RESPONSE_AGENT_MAX_OUTPUT_TOKENS}
      RESPONSE_AGENT_MAX_SELECTED_AGENTS: ${RESPONSE_AGENT_MAX_SELECTED_AGENTS}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8014/health'')"',
        ]
      <<: *healthcheck-defaults

  ai-workflow-service:
    <<: *env-files
    image: ${REGISTRY}/${IMAGE_OWNER}/ai-workflow-service:${IMAGE_TAG}
    container_name: ai-workflow-service
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_WORKFLOW_QUEUE: ${RABBITMQ_WORKFLOW_QUEUE}
      RABBITMQ_WORKFLOW_RESULT_QUEUE: ${RABBITMQ_WORKFLOW_RESULT_QUEUE}
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT}

      AI_WORKFLOW_ENABLE_RABBITMQ_CONSUMER: ${AI_WORKFLOW_ENABLE_RABBITMQ_CONSUMER}
      AI_WORKFLOW_ENABLE_HTTP_TRIGGER: ${AI_WORKFLOW_ENABLE_HTTP_TRIGGER}
      AI_WORKFLOW_MAX_CONCURRENT_RUNS: ${AI_WORKFLOW_MAX_CONCURRENT_RUNS}

      INTENT_PARSER_SERVICE_URL: ${INTENT_PARSER_SERVICE_URL}
      CONTEXT_BUILDER_SERVICE_URL: ${CONTEXT_BUILDER_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      RESPONSE_AGENT_SERVICE_URL: ${RESPONSE_AGENT_SERVICE_URL}

      AI_WORKFLOW_HTTP_TIMEOUT_SECONDS: ${AI_WORKFLOW_HTTP_TIMEOUT_SECONDS}
      INTENT_PARSER_HTTP_TIMEOUT_SECONDS: ${INTENT_PARSER_HTTP_TIMEOUT_SECONDS}
      RESPONSE_AGENT_HTTP_TIMEOUT_SECONDS: ${RESPONSE_AGENT_HTTP_TIMEOUT_SECONDS}
      AI_WORKFLOW_HTTP_MAX_RETRIES: ${AI_WORKFLOW_HTTP_MAX_RETRIES}
    depends_on:
      rabbitmq:
        condition: service_healthy
      llm-intent-parser-service:
        condition: service_healthy
      ai-context-builder-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      llm-response-agent-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8010/health'')"',
        ]
      <<: *healthcheck-defaults

volumes:
  rabbitmq_data:
