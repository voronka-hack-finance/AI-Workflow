services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: finance_ai
      RABBITMQ_DEFAULT_PASS: finance_ai
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-workflow-service
      - llm-intent-parser-service
      - ai-context-builder-service
      - analytics-service
      - llm-response-agent-service

  ai-workflow-service:
    build:
      context: .
      dockerfile: ai-workflow-service/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      INTENT_PARSER_HTTP_TIMEOUT_SECONDS: 150
    depends_on:
      - rabbitmq
      - llm-intent-parser-service
      - ai-context-builder-service
      - analytics-service
      - llm-response-agent-service

  llm-intent-parser-service:
    build:
      context: .
      dockerfile: llm-intent-parser-service/Dockerfile
    ports:
      - "8011:8011"
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      # Hardcoded for Docker dev — do not inherit mock from shell or env_file
      INTENT_PARSER_LLM_PROVIDER: openai_compatible
      INTENT_PARSER_LLM_MODEL: ${INTENT_PARSER_LLM_MODEL:-qwen2.5-7b-instruct}
      OPENAI_COMPATIBLE_BASE_URL: http://host.docker.internal:1234/v1
      INTENT_PARSER_LLM_TIMEOUT_SECONDS: 120
      INTENT_PARSER_FEW_SHOT_LIMIT: 0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-context-builder-service:
    build:
      context: .
      dockerfile: ai-context-builder-service/Dockerfile
    ports:
      - "8012:8012"
    env_file:
      - .env.example

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    ports:
      - "8013:8013"
    env_file:
      - .env.example

  llm-response-agent-service:
    build:
      context: .
      dockerfile: llm-response-agent-service/Dockerfile
    ports:
      - "8014:8014"
    env_file:
      - .env.example
