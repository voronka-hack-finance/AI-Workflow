[project]
name = "shared-logging"
version = "0.1.0"
description = "Shared logging utilities"
readme = "README.md"
requires-python = ">=3.12"

[dependency-groups]
dev = ["ruff>=0.9.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_logging"]
