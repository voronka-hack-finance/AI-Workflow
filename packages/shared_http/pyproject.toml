[project]
name = "shared-http"
version = "0.1.0"
description = "Shared HTTP client utilities"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["httpx>=0.27.0"]

[dependency-groups]
dev = ["pytest>=8.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_http"]

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "shared_http/__init__.py"
"client.py" = "shared_http/client.py"
"errors.py" = "shared_http/errors.py"
