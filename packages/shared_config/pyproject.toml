[project]
name = "shared-config"
version = "0.1.0"
description = "Shared configuration base settings"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["pydantic-settings>=2.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_config"]

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "shared_config/__init__.py"
"settings.py" = "shared_config/settings.py"
