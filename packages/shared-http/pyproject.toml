[project]
name = "shared-http"
version = "0.1.0"
description = "Shared HTTP client utilities"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["httpx>=0.27.0"]

[dependency-groups]
dev = ["ruff>=0.9.0", "pytest>=8.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_http"]
