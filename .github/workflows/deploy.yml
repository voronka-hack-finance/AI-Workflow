name: Build and Deploy AI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  ci-build:
    name: CI - Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: ai-workflow-service
            dockerfile: ai-workflow-service/Dockerfile
          - name: llm-intent-parser-service
            dockerfile: llm-intent-parser-service/Dockerfile
          - name: ai-context-builder-service
            dockerfile: ai-context-builder-service/Dockerfile
          - name: analytics-service
            dockerfile: analytics-service/Dockerfile
          - name: llm-response-agent-service
            dockerfile: llm-response-agent-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase image owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-deploy:
    name: CD - Deploy to AI Server
    runs-on: ubuntu-latest
    needs: ci-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare production env file
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          PRODUCTION_ENV_OVERRIDE: ${{ secrets.AI_PRODUCTION_ENV }}
        run: |
          set -euo pipefail
          owner="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cp .env.production.example .env.production
          sed -i "s/^IMAGE_OWNER=.*/IMAGE_OWNER=${owner}/" .env.production
          if [ -n "${PRODUCTION_ENV_OVERRIDE}" ]; then
            printf '\n%s\n' "${PRODUCTION_ENV_OVERRIDE}" >> .env.production
          fi
          for key in REGISTRY IMAGE_OWNER IMAGE_TAG RABBITMQ_URL BACKEND_RABBITMQ_URL; do
            grep -q "^${key}=" .env.production || { echo "Missing ${key} in .env.production"; exit 1; }
          done
          grep -q '^REGISTRY=ghcr.io' .env.production
          echo "Prepared .env.production ($(wc -l < .env.production) lines)"

      - name: Copy production files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.AI_HOST }}
          username: ${{ secrets.AI_USER }}
          key: ${{ secrets.AI_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.production"
          target: ${{ secrets.AI_APP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          AI_APP_DIR: ${{ secrets.AI_APP_DIR }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
        with:
          host: ${{ secrets.AI_HOST }}
          username: ${{ secrets.AI_USER }}
          key: ${{ secrets.AI_SSH_KEY }}
          envs: AI_APP_DIR,GHCR_TOKEN,GHCR_USERNAME,OLLAMA_MODEL
          script: |
            set -euo pipefail

            cd "${AI_APP_DIR}"
            chmod 600 .env.production

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            if [ -n "${OLLAMA_MODEL:-}" ]; then
              echo "Ensuring Ollama model: ${OLLAMA_MODEL}"
              for i in $(seq 1 30); do
                if docker exec ollama ollama list >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              docker exec ollama ollama pull "${OLLAMA_MODEL}" || true
            fi

            docker image prune -f

            echo "Waiting for services..."
            sleep 20

            curl -fsS http://127.0.0.1:8010/health
            curl -fsS http://127.0.0.1:8011/health
            curl -fsS http://127.0.0.1:8012/health
            curl -fsS http://127.0.0.1:8013/health
            curl -fsS http://127.0.0.1:8014/health
