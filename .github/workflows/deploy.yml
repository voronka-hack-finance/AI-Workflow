name: Build and Deploy AI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  ci-build:
    name: CI - Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: ai-workflow-service
            dockerfile: ai-workflow-service/Dockerfile
          - name: llm-intent-parser-service
            dockerfile: llm-intent-parser-service/Dockerfile
          - name: ai-context-builder-service
            dockerfile: ai-context-builder-service/Dockerfile
          - name: analytics-service
            dockerfile: analytics-service/Dockerfile
          - name: llm-response-agent-service
            dockerfile: llm-response-agent-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase image owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-deploy:
    name: CD - Deploy to AI Server
    runs-on: ubuntu-latest
    needs: ci-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy production compose files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.AI_HOST }}
          username: ${{ secrets.AI_USER }}
          key: ${{ secrets.AI_SSH_KEY }}
          source: "docker-compose.prod.yml,infra/rabbitmq/rabbitmq.conf,infra/rabbitmq/definitions.json"
          target: ${{ secrets.AI_APP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AI_HOST }}
          username: ${{ secrets.AI_USER }}
          key: ${{ secrets.AI_SSH_KEY }}
          script: |
            set -e

            cd "${{ secrets.AI_APP_DIR }}"

            cat > .env.production <<'EOF'
            ${{ secrets.AI_PRODUCTION_ENV }}
            EOF

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            docker image prune -f

            echo "Checking health endpoints..."

            sleep 10

            curl -f http://127.0.0.1:8010/health
            curl -f http://127.0.0.1:8011/health
            curl -f http://127.0.0.1:8012/health
            curl -f http://127.0.0.1:8013/health
            curl -f http://127.0.0.1:8014/health
